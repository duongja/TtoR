<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Polymarket X Signal Monitor</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #10140f;
        color: #eef4e8;
        font-family: ui-sans-serif, system-ui, sans-serif;
      }

      main {
        max-width: 680px;
        padding: 48px;
      }

      h1 {
        margin: 0 0 16px;
        font-size: clamp(32px, 6vw, 64px);
        line-height: 0.95;
      }

      p {
        color: #b8c6ad;
        font-size: 18px;
        line-height: 1.6;
      }

      code {
        color: #c9ff7a;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Polymarket X Signal Monitor</h1>
      <p>
        API-first deployment is live. Use <code>/api/health</code>,
        <code>/api/posts/latest</code>, and <code>/api/meme-signals</code>.
      </p>
    </main>
  </body>
</html>
